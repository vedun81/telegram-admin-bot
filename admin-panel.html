<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🤖 Адмін-панель | UkrMova Pro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      padding: 16px;
      padding-bottom: 80px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    .login-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 32px 24px;
      text-align: center;
      border: 1px solid rgba(255,215,0,0.3);
      margin-top: 50px;
    }

    .login-card h1 {
      color: #ffd700;
      margin-bottom: 8px;
      font-size: 28px;
    }

    .login-card p {
      color: #aaa;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .login-card input {
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      border: none;
      font-size: 16px;
      background: rgba(255,255,255,0.95);
      margin-bottom: 15px;
      text-align: center;
    }

    .login-card button {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      border: none;
      padding: 14px;
      border-radius: 50px;
      font-weight: bold;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
    }

    .error {
      color: #e74c3c;
      margin-top: 10px;
      font-size: 14px;
    }

    .main-content {
      display: none;
    }

    .header {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 16px 20px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      color: #ffd700;
      font-size: 20px;
    }

    .logout-btn {
      background: rgba(231,76,60,0.8);
      border: none;
      padding: 8px 16px;
      border-radius: 50px;
      color: white;
      font-size: 12px;
      cursor: pointer;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .tab {
      background: rgba(255,255,255,0.1);
      border: none;
      padding: 10px 16px;
      border-radius: 50px;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }

    .tab.active {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #1a1a2e;
      font-weight: bold;
    }

    .panel {
      display: none;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 20px;
    }

    .panel.active {
      display: block;
    }

    .search-box {
      margin-bottom: 16px;
    }

    .search-box input {
      width: 100%;
      padding: 12px;
      border-radius: 50px;
      border: none;
      font-size: 14px;
      background: rgba(255,255,255,0.95);
    }

    .players-list {
      max-height: 450px;
      overflow-y: auto;
    }

    .player-card {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 14px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .player-name {
      font-weight: bold;
      font-size: 16px;
    }

    .player-stats {
      font-size: 11px;
      color: #aaa;
    }

    .player-password {
      font-size: 10px;
      color: #ffd700;
      font-family: monospace;
    }

    .player-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 50px;
      border: none;
      font-size: 12px;
      cursor: pointer;
    }

    .btn-primary { background: #3498db; color: white; }
    .btn-success { background: #2ecc71; color: white; }
    .btn-warning { background: #f39c12; color: #1a1a2e; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-info { background: #9b59b6; color: white; }

    .message-card {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 14px;
      margin-bottom: 12px;
      border-left: 4px solid #ffd700;
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .message-text {
      background: rgba(0,0,0,0.3);
      padding: 12px;
      border-radius: 16px;
      margin: 10px 0;
    }

    .reply-area {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .reply-area textarea {
      flex: 1;
      padding: 10px;
      border-radius: 16px;
      border: none;
      background: rgba(255,255,255,0.9);
      font-size: 12px;
      min-height: 60px;
    }

    .log-entry {
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 16px;
      margin-bottom: 8px;
      font-size: 11px;
    }

    .log-time {
      color: #ffd700;
      font-family: monospace;
      font-size: 10px;
    }

    .log-player {
      font-weight: bold;
      color: #2ecc71;
    }

    .log-action {
      color: #aaa;
    }

    .log-details {
      color: white;
    }

    .log-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      padding: 6px 12px;
      border-radius: 50px;
      color: #ccc;
      font-size: 11px;
      cursor: pointer;
    }

    .filter-btn.active {
      background: #ffd700;
      color: #1a1a2e;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .input-group input {
      flex: 1;
      padding: 12px;
      border-radius: 50px;
      border: none;
    }

    hr {
      margin: 15px 0;
      border-color: rgba(255,215,0,0.3);
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #ffd700;
      color: #1a1a2e;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: bold;
      font-size: 13px;
      z-index: 1000;
      display: none;
      white-space: nowrap;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 9px;
      margin-left: 5px;
    }

    .badge-login { background: #2ecc71; color: white; }
    .badge-logout { background: #e74c3c; color: white; }
    .badge-purchase { background: #f39c12; color: #1a1a2e; }
    .badge-level { background: #9b59b6; color: white; }
    .badge-friend { background: #3498db; color: white; }
    .badge-theme { background: #e74c3c; color: white; }
    .badge-money { background: #ffd700; color: #1a1a2e; }

    @media (max-width: 480px) {
      .toast { white-space: normal; text-align: center; max-width: 90%; }
      .player-card { flex-direction: column; align-items: stretch; }
      .player-actions { justify-content: flex-end; }
    }
  </style>
</head>
<body>

<div class="container">
  <div id="loginScreen" class="login-card">
    <h1>🤖 Адмін-панель</h1>
    <p>UkrMova Pro — керування грою</p>
    <input type="password" id="adminPassword" placeholder="Введіть пароль">
    <button onclick="checkLogin()">🔐 Увійти</button>
    <div id="loginError" class="error"></div>
  </div>

  <div id="mainContent" class="main-content">
    <div class="header">
      <h1>👑 Адмін-панель</h1>
      <button class="logout-btn" onclick="logout()">🚪 Вийти</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="players">👥 Гравці</button>
      <button class="tab" data-tab="control">⚙️ Управління</button>
      <button class="tab" data-tab="messages">💬 Підтримка</button>
      <button class="tab" data-tab="logs">📋 ВСІ ЛОГИ</button>
    </div>

    <div id="playersPanel" class="panel active">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Пошук гравця..." onkeyup="searchPlayers()">
      </div>
      <div id="playersList" class="players-list">
        <div style="text-align: center; padding: 20px;">Завантаження...</div>
      </div>
    </div>

    <div id="controlPanel" class="panel">
      <h2 style="color:#ffd700; font-size:18px; margin-bottom:15px;">🎮 Управління гравцем</h2>
      <div class="input-group">
        <input type="text" id="targetNick" placeholder="Нікнейм гравця">
      </div>
      <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;">
        <button class="btn btn-success" onclick="adminAddMoney()">💰 + Гроші</button>
        <button class="btn btn-warning" onclick="adminRemoveMoney()">💸 - Гроші</button>
        <button class="btn btn-danger" onclick="adminDeletePlayer()">🗑 Видалити</button>
      </div>

      <hr>

      <h2 style="color:#ffd700; font-size:18px; margin-bottom:15px;">⚠️ Небезпечні дії</h2>
      <button class="btn btn-danger" onclick="resetAllPurchases()" style="width:100%;">🔄 Скинути ВСІ покупки ВСІХ гравців</button>
      <button class="btn btn-danger" onclick="clearAllGameLogs()" style="width:100%; margin-top:10px;">🗑 Очистити ВСІ логи гри</button>
    </div>

    <div id="messagesPanel" class="panel">
      <div id="messagesList" class="players-list">
        <div style="text-align: center; padding: 20px;">Завантаження...</div>
      </div>
    </div>

    <div id="logsPanel" class="panel">
      <div class="log-filters">
        <button class="filter-btn active" data-filter="all">📋 Всі</button>
        <button class="filter-btn" data-filter="login">🔓 Вхід</button>
        <button class="filter-btn" data-filter="logout">🚪 Вихід</button>
        <button class="filter-btn" data-filter="purchase">🛒 Покупка</button>
        <button class="filter-btn" data-filter="level">⭐ Рівень</button>
        <button class="filter-btn" data-filter="theme">📚 Тема</button>
        <button class="filter-btn" data-filter="friend">👥 Друзі</button>
        <button class="filter-btn" data-filter="money">💰 Гроші</button>
      </div>
      <div id="gameLogsList" class="players-list">
        <div style="text-align: center; padding: 20px;">Завантаження логів...</div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  const DB = "https://ukrmova-game-default-rtdb.europe-west1.firebasedatabase.app/";
  const ADMIN_PASSWORD = "vedun81ansuz81";
  
  let allPlayers = [];
  let allGameLogs = [];
  let currentLogFilter = "all";

  function checkLogin() {
    const pass = document.getElementById('adminPassword').value;
    if (pass === ADMIN_PASSWORD) {
      localStorage.setItem('adminAuth', 'true');
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      document.getElementById('loginError').innerHTML = '';
      loadAllData();
    } else {
      document.getElementById('loginError').innerHTML = '❌ Невірний пароль!';
    }
  }

  function logout() {
    localStorage.removeItem('adminAuth');
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('adminPassword').value = '';
  }

  if (localStorage.getItem('adminAuth') === 'true') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    loadAllData();
  }

  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab + 'Panel').classList.add('active');
    };
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentLogFilter = btn.dataset.filter;
      renderGameLogs();
    };
  });

  async function loadAllData() {
    await loadPlayers();
    await loadMessages();
    await loadGameLogs();
  }

  async function loadPlayers() {
    try {
      const res = await fetch(DB + "users/.json");
      const data = await res.json();
      allPlayers = data ? Object.values(data) : [];
      renderPlayers();
    } catch(e) {
      document.getElementById('playersList').innerHTML = '<div style="text-align:center;padding:20px;color:#e74c3c;">❌ Помилка завантаження</div>';
    }
  }

  function searchPlayers() {
    renderPlayers();
  }

  function renderPlayers() {
    const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
    let filtered = allPlayers;
    if (search) {
      filtered = allPlayers.filter(p => p.name && p.name.toLowerCase().includes(search));
    }
    
    const container = document.getElementById('playersList');
    if (filtered.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa;">👥 Гравців не знайдено</div>';
      return;
    }
    
    container.innerHTML = filtered.map(p => `
      <div class="player-card">
        <div>
          <div class="player-name">${p.name || '???'}</div>
          <div class="player-password">🔑 Пароль: ${p.pass || 'немає'}</div>
          <div class="player-stats">💰 ${(p.points || 0).toLocaleString()} ₴ | 🏆 ${((p.points_earned || p.points) || 0).toLocaleString()} | 🎚️ Рівень ${p.level || 1}</div>
        </div>
        <div class="player-actions">
          <button class="btn btn-primary" onclick="showPlayerInfo('${p.name}')">📋</button>
          <button class="btn btn-success" onclick="quickAddMoney('${p.name}')">💰+1000</button>
        </div>
      </div>
    `).join('');
  }

  async function quickAddMoney(nick) {
    const res = await fetch(DB + "users/" + nick + ".json");
    const player = await res.json();
    if (!player) { showToast("❌ Гравця не знайдено!", true); return; }
    const oldPoints = player.points || 0;
    player.points = oldPoints + 1000;
    await fetch(DB + "users/" + nick + ".json", { method: 'PUT', body: JSON.stringify(player) });
    await addGameLog(nick, 'money', `+1000 ₴ (адмін)`, oldPoints, player.points);
    showToast(`✅ ${nick} +1000 ₴`);
    loadPlayers();
    loadGameLogs();
  }

  async function showPlayerInfo(nick) {
    const res = await fetch(DB + "users/" + nick + ".json");
    const p = await res.json();
    if (!p) { showToast("❌ Гравця не знайдено!", true); return; }
    alert(`📊 ІНФОРМАЦІЯ ПРО ГРАВЦЯ\n\n👤 Нікнейм: ${p.name}\n🔑 Пароль: ${p.pass || 'немає'}\n💰 Баланс: ${(p.points || 0).toLocaleString()} ₴\n🏆 Рейтинг: ${((p.points_earned || p.points) || 0).toLocaleString()}\n🎚️ Рівень: ${p.level || 1}\n📅 Реєстрація: ${p.regDate || 'невідомо'}\n👥 Друзів: ${p.friends?.length || 0}\n🏆 Досягнень: ${Object.keys(p.achievements || {}).length}\n🎨 Стікерів: ${Object.keys(p.stickers || {}).length}\n🛍️ Покупок: ${Object.values(p.items || {}).filter(v => v === true).length}`);
  }

  async function adminAddMoney() {
    const nick = document.getElementById('targetNick').value.trim();
    if (!nick) { showToast("❌ Введіть нікнейм!", true); return; }
    const amount = prompt("💰 Скільки додати?", "1000");
    if (!amount) return;
    const num = parseInt(amount);
    if (isNaN(num)) { showToast("❌ Введіть число!", true); return; }
    
    const res = await fetch(DB + "users/" + nick + ".json");
    const player = await res.json();
    if (!player) { showToast("❌ Гравця не знайдено!", true); return; }
    
    const oldPoints = player.points || 0;
    player.points = oldPoints + num;
    await fetch(DB + "users/" + nick + ".json", { method: 'PUT', body: JSON.stringify(player) });
    await addGameLog(nick, 'money', `+${num} ₴ (адмін)`, oldPoints, player.points);
    showToast(`✅ ${nick} +${num} ₴ (новий баланс: ${player.points} ₴)`);
    loadPlayers();
    loadGameLogs();
  }

  async function adminRemoveMoney() {
    const nick = document.getElementById('targetNick').value.trim();
    if (!nick) { showToast("❌ Введіть нікнейм!", true); return; }
    const amount = prompt("💸 Скільки відняти?", "500");
    if (!amount) return;
    const num = parseInt(amount);
    if (isNaN(num)) { showToast("❌ Введіть число!", true); return; }
    
    const res = await fetch(DB + "users/" + nick + ".json");
    const player = await res.json();
    if (!player) { showToast("❌ Гравця не знайдено!", true); return; }
    
    const oldPoints = player.points || 0;
    player.points = Math.max(0, oldPoints - num);
    await fetch(DB + "users/" + nick + ".json", { method: 'PUT', body: JSON.stringify(player) });
    await addGameLog(nick, 'money', `-${num} ₴ (адмін)`, oldPoints, player.points);
    showToast(`✅ ${nick} -${num} ₴ (новий баланс: ${player.points} ₴)`);
    loadPlayers();
    loadGameLogs();
  }

  async function adminDeletePlayer() {
    const nick = document.getElementById('targetNick').value.trim();
    if (!nick) { showToast("❌ Введіть нікнейм!", true); return; }
    if (confirm(`⚠️ Видалити гравця ${nick}? Цю дію НЕ МОЖНА скасувати!`)) {
      await addGameLog(nick, 'delete', `Гравець видалений адміном`, 0, 0);
      await fetch(DB + "users/" + nick + ".json", { method: 'DELETE' });
      showToast(`🗑 Гравець ${nick} видалений`);
      loadPlayers();
      loadGameLogs();
      document.getElementById('targetNick').value = '';
    }
  }

  async function resetAllPurchases() {
    if (!confirm("⚠️ УВАГА! Скинути ВСІ покупки для ВСІХ гравців?")) return;
    if (!confirm("🔴 ОСТАННЄ ПОПЕРЕДЖЕННЯ! Цю дію НЕ МОЖНА СКАСУВАТИ!")) return;
    
    const allItems = ['gold_frame', 'crown', 'fire', 'shield', 'vip', 'rainbow_name', 'sparkles', 'avatar_frame', 'animated_nick', 'vyshyvanka', 'kobza', 'sunflowers', 'bookshelf', 'theater_mask'];
    
    const res = await fetch(DB + "users/.json");
    const players = await res.json();
    let count = 0;
    
    for (let name in players) {
      const player = players[name];
      let changed = false;
      allItems.forEach(item => {
        if (player.items && player.items[item]) {
          player.items[item] = false;
          changed = true;
        }
        if (player.items && player.items[item + '_active'] !== undefined) {
          delete player.items[item + '_active'];
          changed = true;
        }
      });
      if (changed && player.items) {
        await fetch(DB + "users/" + name + ".json", { method: 'PUT', body: JSON.stringify(player) });
        await addGameLog(name, 'purchase', `СКИНУТО ВСІ ПОКУПКИ (адмін)`, 0, 0);
        count++;
      }
    }
    showToast(`✅ Скинуто покупки для ${count} гравців!`);
    loadPlayers();
    loadGameLogs();
  }

  async function loadMessages() {
    try {
      const res = await fetch(DB + "users/.json");
      const players = await res.json();
      let allMessages = [];
      for (let name in players) {
        const p = players[name];
        if (p.supportMessages && p.supportMessages.length > 0) {
          for (let msg of p.supportMessages) {
            if (!msg.reply) {
              allMessages.push({ player: name, message: msg });
            }
          }
        }
      }
      
      const container = document.getElementById('messagesList');
      if (allMessages.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa;">📭 Немає повідомлень без відповіді</div>';
        return;
      }
      
      container.innerHTML = allMessages.map(msg => `
        <div class="message-card">
          <div class="message-header">
            <strong>👤 ${msg.player}</strong>
            <small>${msg.message.date}</small>
          </div>
          <div class="message-text">${escapeHtml(msg.message.message)}</div>
          <div class="reply-area">
            <textarea id="reply_${msg.message.id}" placeholder="Введіть відповідь..."></textarea>
            <button class="btn btn-primary" onclick="sendReply('${msg.player}', ${msg.message.id})">📨 Відповісти</button>
          </div>
        </div>
      `).join('');
    } catch(e) { console.error(e); }
  }

  async function sendReply(playerName, messageId) {
    const replyText = document.getElementById(`reply_${messageId}`).value.trim();
    if (!replyText) {
      showToast("❌ Введіть відповідь!", true);
      return;
    }
    const res = await fetch(DB + "users/" + playerName + ".json");
    const player = await res.json();
    if (!player) return;
    const msgIndex = player.supportMessages.findIndex(m => m.id === messageId);
    if (msgIndex !== -1) {
      player.supportMessages[msgIndex].reply = replyText;
      await fetch(DB + "users/" + playerName + ".json", { method: 'PUT', body: JSON.stringify(player) });
      await addGameLog(playerName, 'support', `Відповідь: ${replyText.substring(0, 50)}...`, 0, 0);
      showToast(`✅ Відповідь відправлено гравцю ${playerName}`);
      loadMessages();
      loadGameLogs();
    }
  }

  // ========== ЗБІР ЛОГІВ ==========

  async function loadGameLogs() {
    allGameLogs = [];
    
    await collectLoginLogs();
    await collectLogoutLogs();
    await collectPurchaseLogsFromFirebase();
    await collectThemeLogs();
    await collectFriendsLogs();
    await collectAchievementsLogs();
    await collectLevelLogs();
    await collectMoneyLogs();
    
    allGameLogs.sort((a, b) => b.timestamp - a.timestamp);
    renderGameLogs();
  }

  async function collectLoginLogs() {
    try {
      const res = await fetch(DB + "user_logs.json");
      const data = await res.json();
      if (data) {
        Object.values(data).forEach(log => {
          allGameLogs.push({
            type: 'login',
            player: log.game_nick,
            action: '🔓 Вхід в гру',
            details: '',
            time: log.time,
            timestamp: new Date(log.time).getTime()
          });
        });
      }
    } catch(e) { console.error(e); }
  }

  // ЗБІР ЛОГІВ ВИХОДУ
  async function collectLogoutLogs() {
    try {
      const res = await fetch(DB + "logout_logs.json");
      const data = await res.json();
      if (data) {
        Object.values(data).forEach(log => {
          allGameLogs.push({
            type: 'logout',
            player: log.game_nick,
            action: '🚪 Вихід з гри',
            details: `Час гри: ${log.sessionTime || 'невідомо'}`,
            time: log.time,
            timestamp: new Date(log.time).getTime()
          });
        });
      }
    } catch(e) { console.error(e); }
  }

  // ЗБІР ЛОГІВ ПОКУПОК З ТОЧНИМ ЧАСОМ
  async function collectPurchaseLogsFromFirebase() {
    try {
      const res = await fetch(DB + "purchase_logs.json");
      const data = await res.json();
      if (data) {
        Object.values(data).forEach(log => {
          allGameLogs.push({
            type: 'purchase',
            player: log.player,
            action: `🛒 Купівля: ${log.itemName}`,
            details: `Ціна: ${log.price} ₴ | Баланс після: ${log.newBalance} ₴`,
            time: log.time,
            timestamp: new Date(log.time).getTime()
          });
        });
      }
    } catch(e) { console.error(e); }
    
    // Також збираємо покупки з історії гравців
    for (let player of allPlayers) {
      if (player.purchaseHistory && player.purchaseHistory.length > 0) {
        for (let purchase of player.purchaseHistory) {
          allGameLogs.push({
            type: 'purchase',
            player: player.name,
            action: `🛒 Купівля: ${purchase.item}`,
            details: `Ціна: ${purchase.price} ₴`,
            time: purchase.time || 'невідомо',
            timestamp: purchase.timestamp || Date.now()
          });
        }
      }
    }
  }

  async function collectThemeLogs() {
    for (let player of allPlayers) {
      if (player.themeResults) {
        for (let [theme, result] of Object.entries(player.themeResults)) {
          allGameLogs.push({
            type: 'theme',
            player: player.name,
            action: `📚 Проходження теми: ${theme}`,
            details: `${result.correct}/${result.total} правильних (${result.percent}%)`,
            time: result.date || 'невідомо',
            timestamp: result.timestamp || new Date(result.date).getTime() || Date.now()
          });
        }
      }
    }
  }

  async function collectFriendsLogs() {
    for (let player of allPlayers) {
      if (player.friends && player.friends.length > 0) {
        for (let friend of player.friends) {
          allGameLogs.push({
            type: 'friend',
            player: player.name,
            action: `👥 Додано друга: ${friend}`,
            details: `Всього друзів: ${player.friends.length}`,
            time: player.friendsAddTime?.[friend] || 'невідомо',
            timestamp: Date.now()
          });
        }
      }
    }
  }

  async function collectAchievementsLogs() {
    for (let player of allPlayers) {
      if (player.achievements) {
        for (let [ach, value] of Object.entries(player.achievements)) {
          if (value === true) {
            allGameLogs.push({
              type: 'achievement',
              player: player.name,
              action: `🏆 Отримано досягнення: ${ach}`,
              details: '',
              time: player.achievementsTime?.[ach] || 'невідомо',
              timestamp: Date.now()
            });
          }
        }
      }
    }
  }

  async function collectLevelLogs() {
    for (let player of allPlayers) {
      if (player.levelHistory && player.levelHistory.length > 0) {
        for (let level of player.levelHistory) {
          allGameLogs.push({
            type: 'level',
            player: player.name,
            action: `⭐ Підвищення рівня до ${level.level}`,
            details: `Нагорода: +${level.reward} ₴`,
            time: level.time,
            timestamp: level.timestamp
          });
        }
      }
    }
  }

  async function collectMoneyLogs() {
    try {
      const res = await fetch(DB + "money_logs.json");
      const data = await res.json();
      if (data) {
        Object.values(data).forEach(log => {
          allGameLogs.push({
            type: 'money',
            player: log.player,
            action: `💰 Зміна балансу: ${log.change} ₴`,
            details: `${log.reason} | Старий: ${log.oldBalance} ₴ → Новий: ${log.newBalance} ₴`,
            time: log.time,
            timestamp: new Date(log.time).getTime()
          });
        });
      }
    } catch(e) { console.error(e); }
  }

  // Додати новий лог
  async function addGameLog(player, type, action, oldBalance, newBalance) {
    const now = new Date();
    const timeStr = now.toLocaleString('uk-UA', { timeZone: 'Europe/Kyiv' });
    const timestamp = now.getTime();
    
    const logEntry = { type, player, action, details: `Баланс: ${oldBalance} ₴ → ${newBalance} ₴`, time: timeStr, timestamp };
    
    if (type === 'purchase') {
      await fetch(DB + "purchase_logs.json", { method: 'POST', body: JSON.stringify(logEntry) });
    } else if (type === 'money') {
      await fetch(DB + "money_logs.json", { method: 'POST', body: JSON.stringify(logEntry) });
    } else {
      await fetch(DB + "game_logs.json", { method: 'POST', body: JSON.stringify(logEntry) });
    }
  }

  // Функція для додавання логу виходу (викликається з main.js)
  window.addLogoutLog = async function(playerName, sessionTime) {
    const now = new Date();
    const timeStr = now.toLocaleString('uk-UA', { timeZone: 'Europe/Kyiv' });
    await fetch(DB + "logout_logs.json", { 
      method: 'POST', 
      body: JSON.stringify({ game_nick: playerName, time: timeStr, sessionTime: sessionTime }) 
    });
  };

  function renderGameLogs() {
    const container = document.getElementById('gameLogsList');
    let filtered = allGameLogs;
    
    if (currentLogFilter !== 'all') {
      filtered = allGameLogs.filter(log => log.type === currentLogFilter);
    }
    
    if (filtered.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa;">📋 Логів не знайдено</div>';
      return;
    }
    
    container.innerHTML = filtered.slice(0, 100).map(log => {
      let badgeClass = '';
      let badgeText = '';
      switch(log.type) {
        case 'login': badgeClass = 'badge-login'; badgeText = 'Вхід'; break;
        case 'logout': badgeClass = 'badge-logout'; badgeText = 'Вихід'; break;
        case 'purchase': badgeClass = 'badge-purchase'; badgeText = 'Покупка'; break;
        case 'level': badgeClass = 'badge-level'; badgeText = 'Рівень'; break;
        case 'friend': badgeClass = 'badge-friend'; badgeText = 'Друзі'; break;
        case 'theme': badgeClass = 'badge-theme'; badgeText = 'Тема'; break;
        case 'money': badgeClass = 'badge-money'; badgeText = 'Гроші'; break;
        default: badgeClass = 'badge-login'; badgeText = 'Інше';
      }
      
      return `
        <div class="log-entry">
          <div class="log-time">🕐 ${log.time}</div>
          <div><span class="log-player">👤 ${log.player}</span> <span class="badge ${badgeClass}">${badgeText}</span></div>
          <div class="log-action">📌 ${log.action}</div>
          <div class="log-details">${log.details}</div>
        </div>
      `;
    }).join('');
  }

  async function clearAllGameLogs() {
    if (!confirm("⚠️ Очистити ВСІ логи гри? Цю дію не можна скасувати!")) return;
    await fetch(DB + "game_logs.json", { method: 'DELETE' });
    await fetch(DB + "user_logs.json", { method: 'DELETE' });
    await fetch(DB + "logout_logs.json", { method: 'DELETE' });
    await fetch(DB + "purchase_logs.json", { method: 'DELETE' });
    await fetch(DB + "money_logs.json", { method: 'DELETE' });
    showToast("✅ Всі логи очищено");
    loadGameLogs();
  }

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.background = isError ? '#e74c3c' : '#ffd700';
    toast.style.color = isError ? 'white' : '#1a1a2e';
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2500);
  }

  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
</script>
